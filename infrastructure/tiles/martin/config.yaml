# yaml-language-server: $schema=https://raw.githubusercontent.com/maplibre/martin/main/schemas/config.json
#
# Runtime: set DATABASE_URL (Fly: `fly secrets set DATABASE_URL='postgresql://...'`).
# Never put credentials in this file — see config.yaml.example and README.md.

listen_addresses: "0.0.0.0:3000"

postgres:
  # Martin expands ${VAR:?message} at startup; fails fast if unset.
  connection_string: ${DATABASE_URL:?Set DATABASE_URL — e.g. fly secrets set DATABASE_URL='postgresql://USER:PASSWORD@HOST:5432/postgres'}

  auto_publish:
    from_schemas:
      - tiles

  tables:
    tiles_buildings_v:
      schema: tiles
      table: tiles_buildings_v
      srid: 4326
      geometry_column: geom
      id_column: id
