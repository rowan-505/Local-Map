# listen_addresses: "0.0.0.0:3002"

# ---------------------------------------------------------------------------
# Dashboard + web basemap use Martin path: /tiles_buildings_v/{z}/{x}/{y}
# Source layer id in MapLibre: tiles_buildings_v (Postgres view tiles.tiles_buildings_v).
# Register explicitly if auto_publish does not pick up views in schema `tiles`:
#
#   tiles_buildings_v:
#     schema: tiles
#     table: tiles_buildings_v
#     srid: 4326
#     geometry_column: geom
#     id_column: id
#
# See infrastructure/database/migrations/005_tiles_buildings_v.sql, 007_*.sql, and 009_tiles_buildings_v_strict_active.sql
# ---------------------------------------------------------------------------

